<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920">
<title>icarus.sys</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--panel:#0d0d0d;--bdr:#262626;--bdr2:#1a1a1a;--t0:#d4d4d4;--t1:#a3a3a3;--t2:#525252;--hi:#d97706;--up:#16a34a;--dn:#dc2626;--bl:#2563eb;--yl:#a16207;--cyan:#0891b2}
body{font-family:'IBM Plex Mono',monospace;background:var(--bg);color:var(--t1);width:1920px;height:1080px;overflow:hidden;font-size:11px;line-height:1.2;-webkit-font-smoothing:antialiased}

/* ── SHELL ── */
.shell{display:flex;flex-direction:column;height:100%}

/* ── COMMAND BAR ── */
.cmd-bar{height:32px;background:#0d0d0d;border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0}
.cmd-sys{color:var(--hi);font-size:11px;font-weight:500}
.cmd-input{flex:1;background:transparent;border:1px solid var(--bdr2);color:var(--t0);font-family:inherit;font-size:11px;padding:3px 8px;outline:none;caret-color:var(--hi)}
.cmd-input:focus{border-color:var(--bdr)}
.cmd-input::placeholder{color:var(--t2)}

/* ── FUNCTION KEYS ── */
.fn-bar{height:22px;background:#111;border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 10px;gap:2px;flex-shrink:0}
.fn{padding:2px 8px;font-size:10px;color:var(--t2);cursor:pointer;display:flex;gap:4px}
.fn b{color:var(--t1);font-weight:500}
.fn:hover b{color:var(--hi)}
.fn-sep{width:1px;height:12px;background:var(--bdr2);margin:0 4px}
.fn-r{margin-left:auto;display:flex;gap:8px;color:var(--t2);font-size:10px}
.fn-r .live{color:var(--up)}

/* ── STATS RIBBON ── */
.ribbon{height:24px;background:#0d0d0d;border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 10px;gap:4px;flex-shrink:0;font-size:10px}
.ribbon .k{color:var(--t2)}
.ribbon .v{color:var(--t0);margin-right:8px}
.ribbon .sep{color:var(--bdr);margin:0 2px}

/* ── GRID ── */
.grid{flex:1;display:grid;grid-template-columns:440px 1fr 520px;grid-template-rows:1fr 1fr;overflow:hidden}

.P{border:1px solid var(--bdr);border-top:none;border-left:none;display:flex;flex-direction:column;overflow:hidden;background:var(--panel)}
.P:first-child{border-left:1px solid var(--bdr)}
.P-h{height:20px;background:#111;border-bottom:1px solid var(--bdr2);padding:0 8px;display:flex;align-items:center;font-size:10px;color:var(--t2);letter-spacing:0.5px;flex-shrink:0}
.P-h span{margin-left:auto;color:var(--t2)}
.P-b{flex:1;overflow-y:auto;overflow-x:hidden}
.P-b::-webkit-scrollbar{width:2px}
.P-b::-webkit-scrollbar-thumb{background:#333}

/* ── TABLE ── */
.T{width:100%;border-collapse:collapse}
.T th{font-weight:500;color:var(--t2);text-align:left;padding:2px 8px;border-bottom:1px solid var(--bdr2);font-size:10px;position:sticky;top:0;background:#111;letter-spacing:0.5px}
.T td{padding:2px 8px;border-bottom:1px solid #131313;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.T tr:hover td{background:#111}

/* ── TICKER FEED ── */
.tick{padding:2px 8px;border-bottom:1px solid #131313;display:flex;gap:6px;font-size:11px;line-height:1.3}
.tick:hover{background:#111}
.tick-ts{color:var(--t2);flex-shrink:0;width:40px}
.tick-tag{flex-shrink:0;width:42px;text-align:center}
.tick-agent{flex-shrink:0;width:72px;overflow:hidden;text-overflow:ellipsis}
.tick-text{color:var(--t1);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tick-expand{color:var(--t1);white-space:normal;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}

/* ── SYSTEM PANEL ── */
.sys-sec{padding:4px 8px;border-bottom:1px solid var(--bdr2)}
.sys-hd{font-size:10px;color:var(--t2);letter-spacing:0.5px;margin-bottom:3px}
.sys-row{display:flex;align-items:center;gap:6px;padding:1px 0;font-size:11px}
.sys-k{width:40px;text-align:right}
.sys-bar{flex:1;height:4px;background:#1a1a1a}
.sys-fill{height:100%}
.sys-v{width:28px;text-align:right;color:var(--t2)}

/* ── LED INDICATORS ── */
.led{display:inline-block;width:7px;height:7px;flex-shrink:0}
.led-on{background:var(--up)}
.led-off{border:1px solid var(--t2)}

/* ── CHART ── */
canvas{width:100%;height:100%}

/* colors */
.c-hi{color:var(--hi)}.c-up{color:var(--up)}.c-dn{color:var(--dn)}.c-bl{color:var(--bl)}.c-yl{color:var(--yl)}.c-cyan{color:var(--cyan)}

/* ── FOOTER ── */
.footer{height:20px;background:#111;border-top:1px solid var(--bdr);display:flex;align-items:center;padding:0 10px;font-size:10px;color:var(--t2);flex-shrink:0}
.footer span{margin-left:auto}
</style>
</head>
<body>
<div class="shell">

<!-- COMMAND BAR -->
<div class="cmd-bar">
  <span class="cmd-sys">icarus.sys</span>
  <input class="cmd-input" placeholder="> search or command..." id="cmd" spellcheck="false">
</div>

<!-- FUNCTION KEYS -->
<div class="fn-bar">
  <div class="fn" onclick="act('cycle')"><b>F1</b>RUN</div>
  <div class="fn" onclick="act('compact')"><b>F2</b>COMPACT</div>
  <div class="fn"><b>F3</b>LOGS</div>
  <div class="fn"><b>F4</b>FABRIC</div>
  <div class="fn-sep"></div>
  <div class="fn-r">
    <span id="h-live" class="live">CONNECTED</span>
    <span id="h-clock"></span>
  </div>
</div>

<!-- STATS RIBBON -->
<div class="ribbon" id="ribbon"></div>

<!-- MAIN GRID: 3 cols x 2 rows = 6 panels -->
<div class="grid">

  <!-- TOP LEFT: AGENTS -->
  <div class="P">
    <div class="P-h">AGENTS <span id="p-ag-n"></span></div>
    <div class="P-b">
      <table class="T"><thead><tr><th></th><th>NAME</th><th>STATUS</th><th>ROLE</th><th>PLAT</th><th>LAST</th></tr></thead><tbody id="ag-body"></tbody></table>
    </div>
  </div>

  <!-- TOP CENTER: FEED -->
  <div class="P">
    <div class="P-h">TICKER <span id="p-fd-n"></span></div>
    <div class="P-b" id="fd-body"></div>
  </div>

  <!-- TOP RIGHT: CHART -->
  <div class="P">
    <div class="P-h">TIMELINE <span id="p-tm-n"></span></div>
    <div class="P-b"><canvas id="cv"></canvas></div>
  </div>

  <!-- BOTTOM LEFT: FABRIC ENTRIES -->
  <div class="P">
    <div class="P-h">FABRIC <span id="p-me-n"></span></div>
    <div class="P-b">
      <table class="T"><thead><tr><th>TIER</th><th>TYPE</th><th>AGENT</th><th>CONTENT</th><th>AGE</th></tr></thead><tbody id="me-body"></tbody></table>
    </div>
  </div>

  <!-- BOTTOM CENTER: MEMORY DETAIL -->
  <div class="P">
    <div class="P-h">MEMORY</div>
    <div class="P-b" id="mem-detail"></div>
  </div>

  <!-- BOTTOM RIGHT: SYSTEM -->
  <div class="P">
    <div class="P-h">SYSTEM</div>
    <div class="P-b" id="sys-body"></div>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  ICARUS AGENT MEMORY TERMINAL v0.1
  <span id="ft-ts"></span>
</div>

</div>

<script>
var AC={},CP=['#d97706','#2563eb','#16a34a','#9333ea','#dc2626','#a16207','#0891b2','#c2410c'];
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function ago(t){if(!t)return'--';try{var d=new Date(t.replace(' UTC',':00Z').replace(' ','T')),m=Math.floor((Date.now()-d)/6e4);return m<1?'<1m':m<60?m+'m':m<1440?Math.floor(m/60)+'h':Math.floor(m/1440)+'d'}catch(e){return'--'}}
function ac(n){if(!AC[n])AC[n]=CP[Object.keys(AC).length%CP.length];return AC[n]}
function kb(b){return(b/1024).toFixed(1)}

function render(d){
  var s=d.stats;

  // ribbon
  document.getElementById('ribbon').innerHTML=
    '<span class="k">AGENTS</span><span class="v">'+s.activeAgents+'/'+s.totalAgents+'</span><span class="sep">|</span>'+
    '<span class="k">CYCLES</span><span class="v">'+s.totalCycles+'</span><span class="sep">|</span>'+
    '<span class="k">ENTRIES</span><span class="v">'+s.memoryEntries+'</span><span class="sep">|</span>'+
    '<span class="k">HOT</span><span class="v c-hi">'+s.hot+'</span>'+
    '<span class="k">WARM</span><span class="v c-yl">'+s.warm+'</span>'+
    '<span class="k">COLD</span><span class="v c-bl">'+s.cold+'</span><span class="sep">|</span>'+
    '<span class="k">BRAIN</span><span class="v">'+kb(s.brainSize)+'K</span><span class="sep">|</span>'+
    '<span class="k">LAST</span><span class="v">'+(d.lastCycleTs?ago(d.lastCycleTs):'--')+'</span>';

  // panel counts
  document.getElementById('p-ag-n').textContent=s.totalAgents;
  document.getElementById('p-fd-n').textContent=d.feed.length+' events';
  document.getElementById('p-me-n').textContent=d.fabricEntries.length+' entries';
  document.getElementById('p-tm-n').textContent=Object.keys(d.timeline).length+' days';

  // agents table
  var h='';d.agents.forEach(function(a){var c=ac(a.name);
    h+='<tr><td><span class="led '+(a.online?'led-on':'led-off')+'"></span></td><td style="color:'+c+'">'+esc(a.name)+'</td><td>'+(a.online?'<span class="c-up">RUN</span>':'<span class="c-dn">OFF</span>')+'</td><td style="color:var(--t2);max-width:160px">'+esc(a.role)+'</td><td style="color:var(--t2)">'+esc(a.lastPlatform||'--')+'</td><td style="color:var(--t2)">'+ago(a.lastActive)+'</td></tr>';
  });document.getElementById('ag-body').innerHTML=h;

  // ticker feed: headline format
  h='';
  // current cycle
  d.feed.forEach(function(f){var c=ac(f.agent);
    h+='<div class="tick"><span class="tick-ts">'+ago(f.timestamp)+'</span><span class="tick-tag c-cyan">[INFO]</span><span class="tick-agent" style="color:'+c+'">'+esc(f.agent)+'</span><span class="tick-text">cycle '+f.cycle+': '+esc((f.thought||f.response||'').slice(0,120))+'</span></div>';
  });
  // history from all agents
  d.agents.forEach(function(a){var c=ac(a.name);
    a.cycles.slice().reverse().slice(0,6).forEach(function(cy){
      var text=(cy.thought||cy.response||'').slice(0,120);
      h+='<div class="tick"><span class="tick-ts">'+ago(cy.timestamp)+'</span><span class="tick-tag" style="color:var(--t2)">[LOG]</span><span class="tick-agent" style="color:'+c+'">'+esc(a.name)+'</span><span class="tick-text">'+esc(text)+'</span></div>';
    });
  });
  document.getElementById('fd-body').innerHTML=h||'<div style="padding:8px;color:var(--t2)">NO DATA</div>';

  // fabric entries table
  h='';d.fabricEntries.slice(0,25).forEach(function(e){
    var tc=e.tier==='hot'?'c-hi':e.tier==='warm'?'c-yl':'c-bl';
    h+='<tr><td class="'+tc+'">'+esc(e.tier).toUpperCase()+'</td><td style="color:var(--t2)">'+esc(e.type||'--')+'</td><td style="color:'+ac(e.agent)+'">'+esc(e.agent)+'</td><td style="color:var(--t1);max-width:300px">'+esc(e.summary||e.body||'--')+'</td><td style="color:var(--t2)">'+ago(e.timestamp)+'</td></tr>';
  });document.getElementById('me-body').innerHTML=h;

  // memory detail: recent entries expanded
  h='';d.fabricEntries.slice(0,6).forEach(function(e){
    h+='<div style="padding:4px 8px;border-bottom:1px solid #131313"><div style="display:flex;gap:6px;margin-bottom:2px"><span style="color:'+ac(e.agent)+'">'+esc(e.agent)+'</span><span style="color:var(--t2)">'+esc(e.platform)+'</span><span style="color:var(--t2)">'+esc(e.type)+'</span><span style="color:var(--t2);margin-left:auto">'+ago(e.timestamp)+'</span></div><div style="color:var(--t1);font-size:11px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden">'+esc(e.body||e.summary||'--')+'</div></div>';
  });document.getElementById('mem-detail').innerHTML=h||'<div style="padding:8px;color:var(--t2)">EMPTY</div>';

  // system panel
  var t=Math.max(s.hot+s.warm+s.cold,1);
  h='<div class="sys-sec"><div class="sys-hd">TIER ALLOCATION</div>';
  [['HOT',s.hot,'var(--hi)'],['WARM',s.warm,'var(--yl)'],['COLD',s.cold,'var(--bl)']].forEach(function(r){
    h+='<div class="sys-row"><span class="sys-k" style="color:'+r[2]+'">'+r[0]+'</span><div class="sys-bar"><div class="sys-fill" style="width:'+(r[1]/t*100)+'%;background:'+r[2]+'"></div></div><span class="sys-v">'+r[1]+'</span></div>';
  });
  h+='</div>';

  h+='<div class="sys-sec"><div class="sys-hd">PLATFORM STATUS</div>';
  var seen={};d.agents.forEach(function(a){a.platforms.forEach(function(p){
    var k=a.name+p.name;if(seen[k])return;seen[k]=1;var on=p.state==='connected';
    h+='<div class="sys-row"><span class="led '+(on?'led-on':'led-off')+'"></span><span style="width:64px;color:'+ac(a.name)+'">'+esc(a.name)+'</span><span style="width:56px;color:var(--t2)">'+esc(p.name)+'</span><span style="flex:1;text-align:right;color:'+(on?'var(--up)':'var(--dn)')+'">'+p.state.toUpperCase()+'</span></div>';
  })});
  if(!Object.keys(seen).length)h+='<div style="color:var(--t2);padding:2px 0">NONE CONFIGURED</div>';
  h+='</div>';

  h+='<div class="sys-sec"><div class="sys-hd">COMPACTION LOG</div>';
  if(d.compaction.length){d.compaction.forEach(function(c){
    h+='<div style="padding:1px 0;color:var(--t2);font-size:10px"><span style="color:var(--t2)">'+esc(c.timestamp)+'</span> '+c.details.map(esc).join(' ')+'</div>';
  })}else{h+='<div style="color:var(--t2);padding:2px 0;font-size:10px">NO COMPACTION EVENTS</div>'}
  h+='</div>';

  h+='<div class="sys-sec"><div class="sys-hd">BRAIN STATS</div>';
  h+='<div class="sys-row"><span class="sys-k" style="color:var(--t2)">SIZE</span><span style="flex:1;color:var(--t0)">'+kb(s.brainSize)+' KB</span></div>';
  h+='<div class="sys-row"><span class="sys-k" style="color:var(--t2)">FILES</span><span style="flex:1;color:var(--t0)">'+s.memoryEntries+'</span></div>';
  h+='<div class="sys-row"><span class="sys-k" style="color:var(--t2)">AGENTS</span><span style="flex:1;color:var(--t0)">'+s.allPlatforms.length+' platforms across '+s.totalAgents+' agents</span></div>';
  h+='</div>';

  document.getElementById('sys-body').innerHTML=h;

  // chart
  var cv=document.getElementById('cv'),cx=cv.getContext('2d');
  var W=cv.parentElement.clientWidth,H=cv.parentElement.clientHeight;
  cv.width=W;cv.height=H;cx.clearRect(0,0,W,H);
  var days=Object.keys(d.timeline).sort();
  if(days.length<2){cx.fillStyle='#525252';cx.font='10px IBM Plex Mono';cx.fillText('COLLECTING DATA...',W/2-60,H/2);return}
  var agents=[...new Set(d.fabricEntries.map(function(e){return e.agent}))],mx=1;
  days.forEach(function(dy){agents.forEach(function(a){mx=Math.max(mx,(d.timeline[dy]||{})[a]||0)})});
  var pL=32,pR=8,pT=8,pB=16,gW=W-pL-pR,gH=H-pT-pB;
  // grid
  cx.strokeStyle='#1a1a1a';cx.lineWidth=0.5;
  for(var i=0;i<=4;i++){var y=pT+gH/4*i;cx.beginPath();cx.moveTo(pL,y);cx.lineTo(W-pR,y);cx.stroke()}
  // y labels
  cx.fillStyle='#525252';cx.font='9px IBM Plex Mono';
  for(var i=0;i<=4;i++){var v=Math.round(mx-mx/4*i);cx.fillText(v,2,pT+4+gH/4*i)}
  // lines
  agents.forEach(function(ag){
    cx.strokeStyle=ac(ag);cx.lineWidth=1.5;cx.beginPath();
    days.forEach(function(dy,di){
      var px=pL+(di/(days.length-1))*gW,v=(d.timeline[dy]||{})[ag]||0,py=pT+gH-(v/mx)*gH;
      di===0?cx.moveTo(px,py):cx.lineTo(px,py);
    });cx.stroke();
    // dots
    days.forEach(function(dy,di){
      var px=pL+(di/(days.length-1))*gW,v=(d.timeline[dy]||{})[ag]||0,py=pT+gH-(v/mx)*gH;
      if(v>0){cx.fillStyle=ac(ag);cx.fillRect(px-1.5,py-1.5,3,3)}
    });
  });
  // x labels
  cx.fillStyle='#525252';cx.font='9px IBM Plex Mono';
  cx.fillText(days[0],pL,H-2);
  cx.fillText(days[days.length-1],W-pR-70,H-2);
  // legend
  var lx=pL;agents.forEach(function(ag){
    cx.fillStyle=ac(ag);cx.fillRect(lx,H-14,6,6);
    cx.fillStyle='#525252';cx.fillText(ag,lx+10,H-8);
    lx+=cx.measureText(ag).width+20;
  });
}

function act(n){fetch('/api/action/'+n,{method:'POST'}).then(function(r){return r.json()}).then(function(r){console.log(r)})}

// command bar
document.getElementById('cmd').addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    var v=this.value.trim().toLowerCase();
    if(v==='run'||v==='cycle')act('cycle');
    else if(v==='compact')act('compact');
    else if(v==='help')alert('Commands: run, compact, help');
    this.value='';
  }
});

// keyboard shortcuts
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT')return;
  if(e.key==='F1'){e.preventDefault();act('cycle')}
  if(e.key==='F2'){e.preventDefault();act('compact')}
});

// clock
function clock(){
  var n=new Date();
  document.getElementById('h-clock').textContent=n.toISOString().slice(11,19)+' UTC';
  document.getElementById('ft-ts').textContent=n.toISOString().slice(0,10)+' '+n.toISOString().slice(11,19)+' UTC';
}
clock();setInterval(clock,1000);

// data
fetch('/api/data').then(function(r){return r.json()}).then(render);
var sse=new EventSource('/api/stream');
sse.onmessage=function(e){render(JSON.parse(e.data))};
sse.onerror=function(){document.getElementById('h-live').className='c-dn';document.getElementById('h-live').textContent='DISCONNECTED'};
sse.onopen=function(){document.getElementById('h-live').className='live';document.getElementById('h-live').textContent='CONNECTED'};
</script>
</body>
</html>
