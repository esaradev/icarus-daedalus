<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920">
<title>icarus</title>
<link href="https://fonts.googleapis.com/css2?family=Berkeley+Mono&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e10;--card:#141416;--border:#1f1f23;
  --t1:#ededf0;--t2:#8e8e96;--t3:#4e4e56;
  --accent:#e2712e;--blue:#5b8def;--green:#5cb985;--red:#d15b5b;--yellow:#c9a84c;
  --font:'Geist',system-ui,sans-serif;--code:'Berkeley Mono','SF Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--t1);width:1920px;height:1080px;overflow:hidden;display:flex;flex-direction:column;font-size:13px;-webkit-font-smoothing:antialiased}

.bar{height:44px;display:flex;align-items:center;padding:0 24px;border-bottom:1px solid var(--border)}
.bar-logo{font-family:var(--code);font-size:14px;color:var(--accent);letter-spacing:0.5px}
.bar-r{margin-left:auto;display:flex;gap:16px;font-family:var(--code);font-size:11px;color:var(--t3)}
.bar-r .on{color:var(--green)}

.stats{height:72px;display:flex;border-bottom:1px solid var(--border)}
.st{flex:1;padding:12px 20px;border-right:1px solid var(--border)}
.st:last-child{border-right:none}
.st-v{font-family:var(--code);font-size:24px;color:var(--t1);font-variant-numeric:tabular-nums;line-height:1;display:flex;align-items:baseline;gap:6px}
.st-v small{font-size:11px;color:var(--t3);font-weight:400}
.st-k{font-family:var(--code);font-size:10px;color:var(--t3);margin-top:4px;letter-spacing:0.5px}
.tbar{display:inline-flex;height:3px;gap:1px;vertical-align:middle;margin-left:4px}
.tbar i{display:block;height:100%}

.main{flex:1;display:grid;grid-template-columns:38fr 36fr 26fr;overflow:hidden}
.col{overflow-y:auto;border-right:1px solid var(--border)}
.col:last-child{border-right:none}
.col::-webkit-scrollbar{width:3px}
.col::-webkit-scrollbar-thumb{background:var(--border)}

.hd{font-family:var(--code);font-size:10px;color:var(--t3);padding:10px 20px;letter-spacing:0.5px;border-bottom:1px solid var(--border);background:var(--card)}

.row{display:flex;align-items:center;gap:10px;padding:8px 20px;border-bottom:1px solid var(--border)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.name{font-family:var(--code);font-size:12px}
.role{font-size:11px;color:var(--t3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.meta{font-family:var(--code);font-size:10px;color:var(--t3);text-align:right;flex-shrink:0}

.msg{padding:10px 20px;border-bottom:1px solid var(--border)}
.msg-top{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.msg-top .name{font-size:11px}
.msg-top .cyc{font-family:var(--code);font-size:10px;color:var(--t3)}
.msg-top .ts{font-family:var(--code);font-size:10px;color:var(--t3);margin-left:auto}
.msg-body{font-size:12px;color:var(--t2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

.tag{display:inline-block;font-family:var(--code);font-size:9px;padding:1px 5px;border-radius:2px;color:var(--t2);background:var(--card);border:1px solid var(--border)}
.tag-hot{color:var(--accent);border-color:rgba(226,113,46,0.2)}
.tag-warm{color:var(--yellow);border-color:rgba(201,168,76,0.2)}
.tag-cold{color:var(--blue);border-color:rgba(91,141,239,0.2)}

.ent{display:flex;gap:8px;padding:7px 20px;border-bottom:1px solid var(--border);align-items:flex-start}
.ent-tags{display:flex;gap:3px;flex-shrink:0;width:130px;flex-wrap:wrap}
.ent-body{flex:1;font-size:11px;color:var(--t3);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-width:0}
.ent-ts{font-family:var(--code);font-size:10px;color:var(--t3);flex-shrink:0}

.tier{display:flex;align-items:center;gap:6px;padding:5px 20px}
.tier-k{font-family:var(--code);font-size:10px;width:32px;text-align:right}
.tier-bar{flex:1;height:4px;background:var(--border);border-radius:1px;overflow:hidden}
.tier-fill{height:100%}
.tier-n{font-family:var(--code);font-size:10px;width:24px;color:var(--t3);text-align:right;font-variant-numeric:tabular-nums}

.chart-area{padding:8px 20px;height:100px}
canvas{width:100%;height:100%}

.plat{display:flex;align-items:center;gap:6px;padding:6px 20px;border-bottom:1px solid var(--border)}
.plat-name{font-family:var(--code);font-size:11px;flex:1}
.plat-state{font-family:var(--code);font-size:10px}

.cmp{padding:5px 20px;border-bottom:1px solid var(--border);font-family:var(--code);font-size:10px;color:var(--t3)}
.cmp span{color:var(--t3)}

.acts{display:flex;gap:4px;padding:10px 20px;border-top:1px solid var(--border);margin-top:auto}
.btn{font-family:var(--code);font-size:10px;padding:5px 10px;background:transparent;border:1px solid var(--border);color:var(--t3);border-radius:2px;cursor:pointer}
.btn:hover{color:var(--t1);border-color:var(--t3)}

.nil{font-family:var(--code);font-size:10px;color:var(--t3);padding:16px 20px}
</style>
</head>
<body>
<div class="bar">
  <span class="bar-logo">icarus</span>
  <div class="bar-r"><span id="lv" class="on">live</span><span id="lc"></span></div>
</div>
<div class="stats" id="sr"></div>
<div class="main">
  <div class="col">
    <div class="hd">agents</div>
    <div id="al"></div>
    <div class="hd">feed</div>
    <div id="fd"></div>
  </div>
  <div class="col">
    <div class="hd">timeline</div>
    <div class="chart-area"><canvas id="cv"></canvas></div>
    <div class="hd">entries</div>
    <div id="me"></div>
    <div class="hd">tiers</div>
    <div id="tb"></div>
  </div>
  <div class="col">
    <div class="hd">platforms</div>
    <div id="ph"></div>
    <div class="hd">compaction</div>
    <div id="cp"></div>
    <div class="acts">
      <button class="btn" onclick="act('cycle')">run cycle</button>
      <button class="btn" onclick="act('compact')">compact</button>
    </div>
  </div>
</div>

<script>
var AC={},CP=['#e2712e','#5b8def','#5cb985','#a87bdb','#d15b8b','#c9a84c','#4fb8a0','#d15b5b'];
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function ago(t){if(!t)return'';try{var d=new Date(t.replace(' UTC',':00Z').replace(' ','T')),m=Math.floor((Date.now()-d)/6e4);return m<1?'now':m<60?m+'m':m<1440?Math.floor(m/60)+'h':Math.floor(m/1440)+'d'}catch(e){return''}}
function ac(n){if(!AC[n])AC[n]=CP[Object.keys(AC).length%CP.length];return AC[n]}
function tag(c,t){return'<span class="tag tag-'+c+'">'+esc(t)+'</span>'}
function kb(b){return(b/1024).toFixed(1)}

function rS(d){
  var s=d.stats;
  var pb=s.allPlatforms.map(function(p){return'<span class="tag">'+p+'</span>'}).join(' ');
  var tb='<span class="tbar"><i style="width:'+s.hot*4+'px;background:var(--accent)"></i><i style="width:'+Math.max(s.warm,1)*4+'px;background:var(--yellow)"></i><i style="width:'+Math.max(s.cold,1)*4+'px;background:var(--blue)"></i></span>';
  document.getElementById('sr').innerHTML=
    '<div class="st"><div class="st-v">'+s.activeAgents+'<small>/ '+s.totalAgents+'</small></div><div class="st-k">agents</div></div>'+
    '<div class="st"><div class="st-v">'+s.totalCycles+'</div><div class="st-k">cycles</div></div>'+
    '<div class="st"><div class="st-v">'+s.memoryEntries+tb+'</div><div class="st-k">entries</div></div>'+
    '<div class="st"><div class="st-v">'+pb+'</div><div class="st-k">platforms</div></div>'+
    '<div class="st"><div class="st-v">'+kb(s.brainSize)+'<small>KB</small></div><div class="st-k">brain</div></div>'+
    '<div class="st"><div class="st-v">'+(s.totalCycles>0?'3h':'--')+'</div><div class="st-k">interval</div></div>';
  document.getElementById('lc').textContent=d.lastCycleTs?ago(d.lastCycleTs)+' ago':'--';
}

function rA(d){
  var h='';d.agents.forEach(function(a){var c=ac(a.name);
    h+='<div class="row"><div class="dot" style="background:'+(a.online?'var(--green)':'var(--t3)')+'"></div><div class="name" style="color:'+c+'">'+esc(a.name)+'</div><div class="role">'+esc(a.role)+'</div><div class="meta">'+ago(a.lastActive)+'</div></div>';
  });document.getElementById('al').innerHTML=h||'<div class="nil">no agents</div>';
}

function rF(d){
  var h='';d.feed.forEach(function(f){var c=ac(f.agent);
    h+='<div class="msg"><div class="msg-top"><span class="name" style="color:'+c+'">'+esc(f.agent)+'</span><span class="cyc">'+f.cycle+'</span><span class="ts">'+ago(f.timestamp)+'</span></div><div class="msg-body">'+esc(f.thought||f.response)+'</div></div>';
  });document.getElementById('fd').innerHTML=h||'<div class="nil">no activity</div>';
}

function rM(d){
  var h='';d.fabricEntries.slice(0,14).forEach(function(e){
    h+='<div class="ent"><div class="ent-tags">'+tag(e.tier,e.tier)+'<span class="tag">'+esc(e.type||'--')+'</span><span class="tag">'+esc(e.platform||'--')+'</span></div><div class="ent-body"><span style="color:'+ac(e.agent)+'">'+esc(e.agent)+'</span> '+esc(e.summary||e.body)+'</div><div class="ent-ts">'+ago(e.timestamp)+'</div></div>';
  });document.getElementById('me').innerHTML=h||'<div class="nil">no entries</div>';
}

function rT(d){
  var s=d.stats,t=Math.max(s.hot+s.warm+s.cold,1);
  document.getElementById('tb').innerHTML=
    '<div class="tier"><span class="tier-k" style="color:var(--accent)">hot</span><div class="tier-bar"><div class="tier-fill" style="width:'+(s.hot/t*100)+'%;background:var(--accent)"></div></div><span class="tier-n">'+s.hot+'</span></div>'+
    '<div class="tier"><span class="tier-k" style="color:var(--yellow)">warm</span><div class="tier-bar"><div class="tier-fill" style="width:'+(s.warm/t*100)+'%;background:var(--yellow)"></div></div><span class="tier-n">'+s.warm+'</span></div>'+
    '<div class="tier"><span class="tier-k" style="color:var(--blue)">cold</span><div class="tier-bar"><div class="tier-fill" style="width:'+(s.cold/t*100)+'%;background:var(--blue)"></div></div><span class="tier-n">'+s.cold+'</span></div>';
}

function rH(d){
  var seen={},h='';d.agents.forEach(function(a){a.platforms.forEach(function(p){
    var k=a.name+p.name;if(seen[k])return;seen[k]=1;var on=p.state==='connected';
    h+='<div class="plat"><div class="dot" style="background:'+(on?'var(--green)':'var(--red)')+'"></div><span class="plat-name" style="color:'+ac(a.name)+'">'+esc(a.name)+'</span><span class="tag">'+esc(p.name)+'</span><span class="plat-state" style="color:'+(on?'var(--green)':'var(--t3)')+'">'+p.state+'</span></div>';
  })});document.getElementById('ph').innerHTML=h||'<div class="nil">no platforms</div>';
}

function rC(d){
  var h='';d.compaction.forEach(function(c){
    h+='<div class="cmp"><span>'+esc(c.timestamp)+'</span> '+c.details.map(esc).join(' ')+'</div>';
  });document.getElementById('cp').innerHTML=h||'<div class="nil">none</div>';
}

function rV(d){
  var c=document.getElementById('cv'),x=c.getContext('2d'),W=c.parentElement.clientWidth,H=76;
  c.width=W;c.height=H;x.clearRect(0,0,W,H);
  var days=Object.keys(d.timeline).sort();
  if(days.length<2){x.fillStyle='#4e4e56';x.font='10px Berkeley Mono';x.fillText('collecting data',W/2-44,H/2);return}
  var agents=[...new Set(d.fabricEntries.map(function(e){return e.agent}))],mx=1;
  days.forEach(function(dy){agents.forEach(function(a){mx=Math.max(mx,(d.timeline[dy]||{})[a]||0)})});
  var gW=W-8,gH=H-18;
  x.strokeStyle='#1f1f23';x.lineWidth=0.5;
  for(var i=0;i<3;i++){var y=4+gH/2*i;x.beginPath();x.moveTo(4,y);x.lineTo(W-4,y);x.stroke()}
  agents.forEach(function(ag){
    x.strokeStyle=ac(ag);x.lineWidth=1.5;x.beginPath();
    days.forEach(function(dy,di){
      var px=4+(di/(days.length-1))*gW,v=(d.timeline[dy]||{})[ag]||0,py=4+gH-v/mx*gH;
      di===0?x.moveTo(px,py):x.lineTo(px,py);
    });x.stroke();
  });
  x.fillStyle='#4e4e56';x.font='9px Berkeley Mono';
  x.fillText(days[0].slice(5),4,H-2);
  x.fillText(days[days.length-1].slice(5),W-40,H-2);
}

function render(d){rS(d);rA(d);rF(d);rM(d);rT(d);rH(d);rC(d);rV(d)}
function act(n){fetch('/api/action/'+n,{method:'POST'}).then(function(r){return r.json()}).then(function(r){console.log(r)})}
fetch('/api/data').then(function(r){return r.json()}).then(render);
var sse=new EventSource('/api/stream');
sse.onmessage=function(e){render(JSON.parse(e.data))};
sse.onerror=function(){document.getElementById('lv').className='';document.getElementById('lv').textContent='offline'};
sse.onopen=function(){document.getElementById('lv').className='on';document.getElementById('lv').textContent='live'};
</script>
</body>
</html>
